name: CI

# Runs only the one canonical quality gate, identically to local development:
#   python3 ci.py
# No third-party actions beyond GitHub-maintained checkout/setup-python; no
# deploy/publish steps; no secrets; no services; least-privilege read-only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Run canonical quality gate
        run: python3 ci.py
